<!DOCTYPE html>
<html>
<head>
<title>Word Guess</title>

<style>
body{
background:#121213;
color:white;
font-family:Arial;
text-align:center;
}

h1{
margin-top:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(5,70px);
gap:8px;
justify-content:center;
margin-top:40px;
}

.tile{
width:70px;
height:70px;
border:2px solid #3a3a3c;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
text-transform:uppercase;
}

input{
margin-top:30px;
padding:10px;
font-size:20px;
text-align:center;
text-transform:uppercase;
width:200px;
}
</style>

</head>

<body>

<h1>WORD GUESS</h1>

<div class="grid" id="grid">
<div class="tile"></div>
<div class="tile"></div>
<div class="tile"></div>
<div class="tile"></div>
<div class="tile"></div>
</div>

<input id="guessInput" maxlength="6" placeholder="Type guess">

<script>

const secretWord = "SECRET";

const input = document.getElementById("guessInput");
const tiles = document.querySelectorAll(".tile");

input.addEventListener("keydown", function(event){

if(event.key === "Enter"){

let guess = input.value.toUpperCase();

for(let i=0;i<tiles.length;i++){
tiles[i].textContent = guess[i] || "";
}

if(guess === secretWord){

alert("Secret unlocked!");

window.location.href = "game2.html";

}

input.value = "";

}

});

</script>

</body>
</html>
