background:#0f172a;

#tetrisContainer{
display:none;
position:fixed;
top:0;

width:100%;

justify-content:center;
flex-direction:column;
}

canvas{
border:4px solid white;
}

position:absolute;
top:20px;
right:20px;
background:red;
}

</style>

<body>

<h1>Game Hub</h1>

<button onclick="startTetris()">Play Tetris</button>

<div id="tetrisContainer">

<button id="closeBtn" onclick="closeGame()">Exit</button>

<canvas id="tetris" width="240" height="400"></canvas>

</div>

<script>

function startTetris(){
document.getElementById("tetrisContainer").style.display="flex";
}

function closeGame(){
document.getElementById("tetrisContainer").style.display="none";
}

const canvas = document.getElementById("tetris");
const context = canvas.getContext("2d");

context.scale(20,20);

function createMatrix(w,h){
const matrix=[];
while(h--){
matrix.push(new Array(w).fill(0));
}
return matrix;
}

function createPiece(type){
if(type==='T'){
return[
[0,1,0],
[1,1,1],
[0,0,0],
];
}
if(type==='O'){
return[
[2,2],
[2,2],
];
}
if(type==='L'){
return[
[0,3,0],
[0,3,0],
[0,3,3],
];
}
if(type==='J'){
return[
[0,4,0],
[0,4,0],
[4,4,0],
];
}
if(type==='I'){
return[
[0,5,0,0],
[0,5,0,0],
[0,5,0,0],
[0,5,0,0],
];
}
if(type==='S'){
return[
[0,6,6],
[6,6,0],
[0,0,0],
];
}
if(type==='Z'){
return[
[7,7,0],
[0,7,7],
[0,0,0],
];
}
}

const arena=createMatrix(12,20);

const player={
pos:{x:0,y:0},
matrix:null
};

function drawMatrix(matrix,offset){
matrix.forEach((row,y)=>{
row.forEach((value,x)=>{
if(value!==0){
context.fillStyle='white';
context.fillRect(x+offset.x,y+offset.y,1,1);
}
});
});
}

function draw(){
context.fillStyle='#000';
context.fillRect(0,0,canvas.width,canvas.height);

drawMatrix(arena,{x:0,y:0});
drawMatrix(player.matrix,player.pos);
}

function playerReset(){
const pieces='TJLOSZI';
player.matrix=createPiece(pieces[Math.floor(Math.random()*pieces.length)]);
player.pos.y=0;
player.pos.x=(arena[0].length/2|0)-(player.matrix[0].length/2|0);
}

function playerDrop(){
player.pos.y++;
draw();
}

let dropCounter=0;
let dropInterval=1000;
let lastTime=0;

function update(time=0){
const deltaTime=time-lastTime;
lastTime=time;

dropCounter+=deltaTime;

if(dropCounter>dropInterval){
playerDrop();
dropCounter=0;
}

draw();
requestAnimationFrame(update);
}

document.addEventListener("keydown",event=>{
if(event.key==="ArrowLeft"){
player.pos.x--;
}
else if(event.key==="ArrowRight"){
player.pos.x++;
}
else if(event.key==="ArrowDown"){
playerDrop();
}
});

playerReset();
update();

</script>

</body>
